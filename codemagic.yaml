workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: spa
    integrations:
      app_store_connect: Priroda Spa
    environment:
      flutter: stable
      xcode: latest
    ios_signing:
      distribution_type: app_store
      bundle_identifier: ru.prirodaspa.app

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      - name: Versioning
        script: |
          cd ./ios
          set -e
          # Важно: CFBundleVersion (build number) должен всегда расти.
          # Чтобы исключить дубли, используем уникальный номер по дате/времени.
          BUILD_VERSION="$(date +%Y%m%d%H%M)"
          echo "Using BUILD_VERSION=$BUILD_VERSION"
          echo "BUILD_VERSION=$BUILD_VERSION" >> "$CM_ENV"

          agvtool new-version -all "$BUILD_VERSION"
          agvtool new-marketing-version 1.0.2
      - name: Flutter build IPA and automatic versioning
        script: |
          flutter build ipa --release --build-name=1.0.2 --build-number="$BUILD_VERSION"

    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_logs/iosApp.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /Users/builder/clone/build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - farm49595@gmail.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true