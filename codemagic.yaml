workflows:
  ios-release:
    name: iOS Release Build
    instance_type: mac_mini_m1
    max_build_duration: 120
    working_directory: spa

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      vars:
        CM_CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD # Пароль должен быть задан в Codemagic UI

    scripts:
      - name: Initialize Keychain
        script: |
          keychain initialize

      - name: Import Certificate
        script: |
          keychain add-certificates \
            --certificate ../certificate.p12 \
            --certificate-password "$CM_CERTIFICATE_PASSWORD"

      - name: Prepare Signing Files & Build
        script: |
          # 1. Install Provisioning Profile
          PROFILES_DIR=$HOME/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          cp ../Priroda_Spa.mobileprovision "$PROFILES_DIR/"
          
          # 2. Extract Data from Profile
          PROFILE_PATH="../Priroda_Spa.mobileprovision"
          
          # Extract UUID
          UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          # Extract Team ID (ищем строку TeamIdentifier и берем значение из массива ниже)
          # XML структура сложная, пробуем grep с контекстом. Обычно это <key>TeamIdentifier</key> <array> <string>TEAMID</string> </array>
          # Упрощенный вариант:
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | grep -A2 TeamIdentifier | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          # Extract Profile Name
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | grep -A1 Name | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          echo "✅ Using Profile: $PROFILE_NAME"
          echo "✅ UUID: $UUID"
          echo "✅ Team ID: $TEAM_ID"
          
          if [ -z "$UUID" ] || [ -z "$TEAM_ID" ]; then
            echo "❌ Failed to extract UUID or Team ID from profile!"
            exit 1
          fi

          # 3. Patch Xcode Project (project.pbxproj)
          # Мы добавляем явное указание профиля и команды для Release конфигурации
          PROJECT="ios/Runner.xcodeproj/project.pbxproj"
          
          # Замена для Release конфигураций (там где Bundle ID ru.prirodaspa.app)
          # Добавляем PROVISIONING_PROFILE_SPECIFIER и DEVELOPMENT_TEAM
          sed -i '' "s/PRODUCT_BUNDLE_IDENTIFIER = ru.prirodaspa.app;/PRODUCT_BUNDLE_IDENTIFIER = ru.prirodaspa.app; PROVISIONING_PROFILE_SPECIFIER = \"$UUID\"; DEVELOPMENT_TEAM = \"$TEAM_ID\"; CODE_SIGN_IDENTITY = \"iPhone Distribution\";/g" "$PROJECT"
          
          echo "✅ Patched project.pbxproj with signing info"

          # 4. Generate ExportOptions.plist dynamically
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ru.prirodaspa.app</key>
              <string>$PROFILE_NAME</string>
            </dict>
            <key>stripSwiftSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF
          
          echo "✅ Generated ExportOptions.plist"

      - name: Install deps
        script: flutter pub get

      - name: Install pods
        script: |
          cd ios
          pod install

      - name: Build IPA
        script: |
          flutter build ipa --release --export-options-plist=ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
