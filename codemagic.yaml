workflows:
  ios-manual-2026:
    name: iOS Manual Signing 2026
    instance_type: mac_mini_m1
    max_build_duration: 120
    working_directory: spa

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - "1"
      vars:
        CM_CERTIFICATE_PASSWORD: "12345" # Hardcoded for debugging

    scripts:
      - name: Full Build & Publish Cycle
        script: |
          set -e # Exit immediately if a command exits with a non-zero status
          set -x # Print commands for debugging

          echo "🚀 STARTING FULL BUILD CYCLE"

          # --- 1. DECODE SECRETS ---
          echo "🔓 Decoding secrets..."
          echo "$CM_CERTIFICATE" | base64 --decode > ../certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ../profile.mobileprovision
          
          echo "📊 File sizes:"
          ls -l ../certificate.p12
          ls -l ../profile.mobileprovision
          
          if [ ! -s "../certificate.p12" ]; then
             echo "❌ Error: certificate.p12 is empty!"
             exit 1
          fi
          
          # --- 2. INITIALIZE KEYCHAIN ---
          echo "🔐 Initializing Keychain..."
          keychain initialize

          # --- 3. IMPORT CERTIFICATE ---
          echo "🔑 Importing certificate..."
          # Verify integrity first
          openssl pkcs12 -info -in ../certificate.p12 -passin pass:12345 -noout || echo "⚠️ P12 check warning"
          
          keychain add-certificates \
            --certificate ../certificate.p12 \
            --certificate-password "12345"

          # --- 4. PREPARE SIGNING ---
          echo "📝 Preparing Signing Configuration..."
          
          # Extract Data from Profile
          PROFILE_PATH="../profile.mobileprovision"
          UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | grep -A2 TeamIdentifier | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          echo "✅ UUID: $UUID"
          echo "✅ Team ID: $TEAM_ID"

          if [ -z "$UUID" ]; then echo "❌ UUID is empty"; exit 1; fi

          # Install Provisioning Profile
          PROFILES_DIR=$HOME/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "✅ Installed profile to $PROFILES_DIR/$UUID.mobileprovision"

          # Generate ExportOptions.plist
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ru.prirodaspa.app</key>
              <string>$UUID</string>
            </dict>
          </dict>
          </plist>
          EOF

          # --- 5. PREPARE DEPENDENCIES ---
          echo "📦 Installing Dependencies..."
          flutter pub get
          
          # Ensure iOS config exists (no codesign to avoid errors before we patch)
          flutter build ios --config-only --no-codesign || true

          cd ios
          pod install --repo-update || true
          
          # Patch Podfile safely using Ruby
          echo "🔧 Patching Podfile..."
          ruby -e "
            path = 'Podfile'
            if File.exist?(path)
              text = File.read(path)
              if text.include?('post_install') && !text.include?('CODE_SIGNING_ALLOWED')
                puts 'Found post_install, injecting settings...'
                snippet = \"flutter_additional_ios_build_settings(target); target.build_configurations.each { |cfg| cfg.build_settings['CODE_SIGNING_ALLOWED']='NO'; cfg.build_settings['CODE_SIGNING_REQUIRED']='NO'; cfg.build_settings['EXPANDED_CODE_SIGN_IDENTITY']=''; cfg.build_settings['CODE_SIGNING_IDENTITY']='' }\"
                new_text = text.gsub(/flutter_additional_ios_build_settings\(target\)/, snippet)
                File.write(path, new_text)
              elsif !text.include?('post_install')
                puts 'No post_install found, appending...'
                File.open(path, 'a') { |f| f.puts \"\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n      config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['CODE_SIGNING_IDENTITY'] = ''\n    end\n  end\nend\" }
              end
            else
               puts '❌ Podfile not found'
               exit 1
            end
          "
          
          pod install
          cd ..

          # --- 6. BUILD ARCHIVE ---
          echo "🏗 Building Archive..."
          
          # Patch Xcode Project
          gem install xcodeproj
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
            target = project.targets.find { |t| t.name == 'Runner' }
            target.build_configurations.each do |config|
              if config.name == 'Release'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = '$UUID'
                config.build_settings['DEVELOPMENT_TEAM'] = '$TEAM_ID'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'iPhone Distribution'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'ru.prirodaspa.app'
              end
            end
            project.save
          "

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates

          # --- 7. EXPORT IPA ---
          echo "📦 Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

          # --- 8. PUBLISH TO APP STORE ---
          echo "🚀 Publishing to App Store Connect..."
          
          # Prepare API Key File in the standard location for altool
          # altool looks in ~/private_keys/
          mkdir -p ~/private_keys
          KEY_FILE="$HOME/private_keys/AuthKey_$APP_STORE_KEY_ID.p8"
          
          echo "🔑 Preparing API Key at $KEY_FILE"
          
          # Use Python to decode/write the key safely
          python3 -c "
          import os
          import base64
          
          key = os.environ.get('APP_STORE_PRIVATE_KEY', '').strip()
          path = '$KEY_FILE'
          
          try:
              content = ''
              if 'BEGIN PRIVATE KEY' not in key:
                  content = base64.b64decode(key).decode('utf-8')
                  print('✅ Detected Base64 key, decoded successfully.')
              else:
                  print('ℹ️ Detected raw PEM key, using as is.')
                  content = key
                  
              with open(path, 'w') as f:
                  f.write(content)
                  if not content.endswith('\n'):
                      f.write('\n')
              
              # Set proper permissions (read-only for owner)
              os.chmod(path, 0o600)
              print(f'✅ Key file created at {path}')
              print(f'✅ Key file size: {os.path.getsize(path)} bytes')
              print(f'✅ Key file permissions: {oct(os.stat(path).st_mode)[-3:]}')
                      
          except Exception as e:
              print(f'❌ Error processing key: {e}')
              exit(1)
          "
          
          # Verify key file exists and is readable
          if [ ! -f "$KEY_FILE" ]; then
            echo "❌ Key file not found at $KEY_FILE"
            exit 1
          fi
          
          # Verify key content starts correctly
          KEY_FIRST_LINE=$(head -n 1 "$KEY_FILE")
          if ! echo "$KEY_FIRST_LINE" | grep -q "BEGIN"; then
            echo "❌ Key file format incorrect (should start with BEGIN)"
            echo "First line: $KEY_FIRST_LINE"
            exit 1
          fi
          
          # Show first and last lines of key (for debugging, without exposing full key)
          echo "✅ Key file verified: $KEY_FILE"
          echo "Key first line: $KEY_FIRST_LINE"
          echo "Key last line: $(tail -n 1 "$KEY_FILE")"
          
          # Verify key file is not empty and has reasonable size
          KEY_SIZE=$(stat -f%z "$KEY_FILE" 2>/dev/null || stat -c%s "$KEY_FILE" 2>/dev/null || echo "0")
          if [ "$KEY_SIZE" -lt 100 ]; then
            echo "❌ Key file seems too small ($KEY_SIZE bytes)"
            exit 1
          fi
          echo "✅ Key file size: $KEY_SIZE bytes"
          
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          
          if [ -z "$IPA_PATH" ]; then
            echo "❌ No IPA file found!"
            exit 1
          fi
          
          # Verify environment variables
          echo "🔍 Verifying environment variables..."
          if [ -z "$APP_STORE_KEY_ID" ]; then
            echo "❌ APP_STORE_KEY_ID is not set!"
            exit 1
          fi
          if [ -z "$APP_STORE_ISSUER_ID" ]; then
            echo "❌ APP_STORE_ISSUER_ID is not set!"
            exit 1
          fi
          echo "✅ APP_STORE_KEY_ID: $APP_STORE_KEY_ID"
          echo "✅ APP_STORE_ISSUER_ID: $APP_STORE_ISSUER_ID"
          
          echo "📦 Uploading $IPA_PATH to App Store Connect..."
          
          # IMPORTANT: The app MUST exist in App Store Connect first!
          # If you see "Failed to determine the Apple ID from Bundle ID", 
          # it means the app doesn't exist yet.
          # 
          # Solution: Go to App Store Connect and create the app manually,
          # OR use the workaround below to skip validation
          
          # Try upload - altool has known issues with API keys, so we'll try multiple approaches
          echo "🚀 Attempting to upload IPA..."
          
          # Method 1: Try altool with API key
          echo "📤 Method 1: Using altool with API key..."
          UPLOAD_LOG=$(mktemp)
          if xcrun altool --upload-app \
            -f "$IPA_PATH" \
            -t ios \
            --apiKey "$APP_STORE_KEY_ID" \
            --apiIssuer "$APP_STORE_ISSUER_ID" \
            --verbose 2>&1 | tee "$UPLOAD_LOG"; then
            echo "✅ Upload successful with altool!"
            echo "⏳ Processing usually takes 10-30 minutes"
            echo "📱 Check App Store Connect -> TestFlight after processing"
            exit 0
          fi
          
          # If we get here, upload failed - analyze the error
          echo ""
          echo "❌ Upload failed. Analyzing error..."
          cat "$UPLOAD_LOG"
          
          # Check error type
          if grep -q "Failed to determine the Apple ID from Bundle ID" "$UPLOAD_LOG"; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  ERROR: App with Bundle ID 'ru.prirodaspa.app' NOT FOUND in App Store Connect!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "📋 SOLUTION - Create the app manually:"
            echo ""
            echo "1. Go to: https://appstoreconnect.apple.com"
            echo "2. Click: 'My Apps' → '+' → 'New App'"
            echo "3. Fill in the form:"
            echo "   • Platform: iOS"
            echo "   • Name: PRIRODA SPA"
            echo "   • Primary Language: Russian"
            echo "   • Bundle ID: ru.prirodaspa.app  ← MUST MATCH EXACTLY!"
            echo "   • SKU: prirodaspa-ios-001  (or any unique identifier)"
            echo "4. Click 'Create'"
            echo "5. Wait 1-2 minutes for Apple to process"
            echo "6. Run this Codemagic build again"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          
          if grep -q "CryptoKit" "$UPLOAD_LOG"; then
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "⚠️  ERROR: API Key authentication failed (CryptoKit error)!"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "This usually means one of:"
            echo "  • API key doesn't have 'App Manager' or 'Admin' role"
            echo "  • API key is expired or invalid"
            echo "  • altool has a bug with this API key format"
            echo ""
            echo "📋 SOLUTION:"
            echo ""
            echo "1. Check API key permissions:"
            echo "   https://developer.apple.com/account/resources/authkeys/list"
            echo ""
            echo "2. Find key ID: $APP_STORE_KEY_ID"
            echo "   Ensure it has 'App Manager' or 'Admin' role"
            echo ""
            echo "3. If permissions are wrong, create a NEW key:"
            echo "   • Click '+' to create new key"
            echo "   • Name it (e.g., 'Codemagic Upload Key')"
            echo "   • Select 'App Manager' role"
            echo "   • Download the .p8 file (you can only download once!)"
            echo "   • Copy the Key ID"
            echo ""
            echo "4. Update Codemagic environment variables:"
            echo "   • APP_STORE_KEY_ID = new Key ID"
            echo "   • APP_STORE_PRIVATE_KEY = contents of .p8 file (base64 encoded)"
            echo ""
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            exit 1
          fi
          
          # Unknown error
          echo ""
          echo "❌ Unknown upload error. Full log:"
          cat "$UPLOAD_LOG"
          exit 1

    artifacts:
      - build/ios/ipa/*.ipa
