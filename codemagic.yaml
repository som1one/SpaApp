workflows:
  ios-release:
    name: iOS Release
    instance_type: mac_mini_m2
    max_build_duration: 120
    working_directory: spa
    integrations:
      app_store_connect: Priroda Spa
    environment:
      flutter: stable
      xcode: latest
    ios_signing:
      distribution_type: app_store
      bundle_identifier: ru.prirodaspa.app

    scripts:
      - name: Get Flutter packages
        script: |
          flutter pub get
      - name: Install pods
        script: |
          find . -name "Podfile" -execdir pod install \;
      - name: Set up code signing settings on Xcode project
        script: |
          xcode-project use-profiles
      # Не используйте имя BUILD_NUMBER: в Codemagic это встроенная переменная (счётчик сборок
      # воркфлоу). На 11-й сборке она равна 11 — из‑за этого в IPA попадал CFBundleVersion 11,
      # а не номер из pubspec.yaml.
      - name: Flutter build IPA (версия из pubspec)
        script: |
          set -e
          VERSION_LINE=$(grep "^version:" pubspec.yaml)
          IOS_VERSION_NAME=$(echo "$VERSION_LINE" | sed 's/version: //' | sed 's/+.*//')
          IOS_BUILD_NUMBER=$(echo "$VERSION_LINE" | sed 's/.*+//')
          if ! [[ "$IOS_BUILD_NUMBER" =~ ^[0-9]+$ ]]; then
            echo "ERROR: в pubspec.yaml укажите версию с номером сборки, например version: 1.0.3+14"
            exit 1
          fi
          echo "CFBundleShortVersionString=$IOS_VERSION_NAME CFBundleVersion=$IOS_BUILD_NUMBER"
          echo "(справочно: Codemagic BUILD_NUMBER=$BUILD_NUMBER — это не версия приложения)"
          cd ios
          agvtool new-version -all "$IOS_BUILD_NUMBER"
          agvtool new-marketing-version "$IOS_VERSION_NAME"
          cd ..
          flutter build ipa --release \
            --build-name="$IOS_VERSION_NAME" \
            --build-number="$IOS_BUILD_NUMBER"

    artifacts:
      - build/ios/iphonesimulator/Runner.app
      - /tmp/xcodebuild_logs/*.log
      - /tmp/xcodebuild_logs/iosApp.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - /Users/builder/clone/build/ios/ipa/*.ipa
      - flutter_drive.log

    publishing:
      email:
        recipients:
          - farm49595@gmail.com
        notify:
          success: true
          failure: false
      app_store_connect:
        auth: integration
        submit_to_testflight: true