workflows:
  ios-manual-2026:
    name: iOS Manual Signing 2026
    instance_type: mac_mini_m1
    max_build_duration: 120
    working_directory: spa

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - "1"
      vars:
        CM_CERTIFICATE_PASSWORD: $CM_CERTIFICATE_PASSWORD
        # CM_CERTIFICATE и CM_PROVISIONING_PROFILE берутся из Environment variables

    scripts:
      - name: Decode Secrets
        script: |
          echo "🔓 Decoding secrets..."
          # Декодируем сертификат и профиль из переменных окружения
          # Используем base64 --decode (Linux/standard)
          echo "$CM_CERTIFICATE" | base64 --decode > ../certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ../profile.mobileprovision
          
          echo "📊 File sizes:"
          ls -l ../certificate.p12
          ls -l ../profile.mobileprovision
          
          if [ ! -s "../certificate.p12" ]; then
             echo "❌ Error: certificate.p12 is empty! Check CM_CERTIFICATE variable."
             exit 1
          fi
          
          echo "✅ Secrets decoded to ../certificate.p12 and ../profile.mobileprovision"

      - name: Initialize Keychain
        script: |
          keychain initialize

      - name: Import Certificate
        script: |
          # Пробуем проверить p12 перед импортом
          echo "🔍 Verifying P12 integrity..."
          # Проверяем, подходит ли пароль 12345
          openssl pkcs12 -info -in ../certificate.p12 -passin pass:12345 -noout || echo "❌ OpenSSL check failed! Wrong password or corrupted file."

          echo "🔑 Importing certificate..."
          keychain add-certificates \
            --certificate ../certificate.p12 \
            --certificate-password "12345"

      - name: Prepare Signing & Build
        script: |
          # 1. Install Provisioning Profile
          PROFILES_DIR=$HOME/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          cp ../profile.mobileprovision "$PROFILES_DIR/"
          
          # 2. Extract Data from Profile
          PROFILE_PATH="../profile.mobileprovision"
          
          # Извлекаем UUID, Team ID и Имя профиля
          UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | grep -A2 TeamIdentifier | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          PROFILE_NAME=$(security cms -D -i "$PROFILE_PATH" | grep -A1 Name | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          echo "✅ Using Profile: $PROFILE_NAME"
          echo "✅ UUID: $UUID"
          echo "✅ Team ID: $TEAM_ID"

          if [ -z "$UUID" ]; then echo "❌ UUID is empty"; exit 1; fi

          # 3. Generate ExportOptions.plist dynamically
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$TEAM_ID</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ru.prirodaspa.app</key>
              <string>$PROFILE_NAME</string>
            </dict>
          </dict>
          </plist>
          EOF

          # 4. Install Dependencies
          flutter pub get
          cd ios
          
          # Генерируем Podfile (если его нет) через flutter build ios --config-only или просто pod install
          # Но лучше дать flutter сделать свое дело
          
          # Пытаемся запустить pod install, чтобы появился Podfile
          pod install --repo-update || true
          
          echo "🔧 Patching Podfile to disable signing for Pods..."
          # Дописываем скрипт отключения подписи
          cat >> Podfile <<EOF

          post_install do |installer|
            installer.pods_project.targets.each do |target|
              target.build_configurations.each do |config|
                config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'
                config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'
                config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ""
                config.build_settings['CODE_SIGNING_IDENTITY'] = ""
              end
            end
          end
          EOF
          
          echo "✅ Podfile patched. Running pod install again..."
          pod install
          cd ..

          # 5. Build Archive (Direct xcodebuild)
          echo "🚀 Starting Archive..."
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            CODE_SIGN_IDENTITY="iPhone Distribution" \
            PROVISIONING_PROFILE_SPECIFIER="$UUID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            PRODUCT_BUNDLE_IDENTIFIER="ru.prirodaspa.app" \
            -allowProvisioningUpdates

          # 6. Export IPA
          echo "🚀 Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

    artifacts:
      - build/ios/ipa/*.ipa
