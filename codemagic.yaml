workflows:
  ios-manual-2026:
    name: iOS Manual Signing 2026
    instance_type: mac_mini_m1
    max_build_duration: 120
    working_directory: spa

    environment:
      flutter: stable
      xcode: latest
      cocoapods: default
      groups:
        - "1"
      vars:
        CM_CERTIFICATE_PASSWORD: "12345" # Hardcoded for debugging

    scripts:
      - name: Full Build & Publish Cycle
        script: |
          set -e # Exit immediately if a command exits with a non-zero status
          set -x # Print commands for debugging

          echo "ЁЯЪА STARTING FULL BUILD CYCLE"
          
          # --- 0. VERIFY ENVIRONMENT VARIABLES ---
          echo "ЁЯФН Verifying environment variables..."
          if [ -z "$APP_STORE_KEY_ID" ]; then
            echo "тЭМ ERROR: APP_STORE_KEY_ID is not set in environment!"
            echo "   Please add it to Codemagic environment variables (group '1')"
            exit 1
          fi
          if [ -z "$APP_STORE_ISSUER_ID" ]; then
            echo "тЭМ ERROR: APP_STORE_ISSUER_ID is not set in environment!"
            echo "   Please add it to Codemagic environment variables (group '1')"
            exit 1
          fi
          if [ -z "$APP_STORE_PRIVATE_KEY" ]; then
            echo "тЭМ ERROR: APP_STORE_PRIVATE_KEY is not set in environment!"
            echo "   Please add it to Codemagic environment variables (group '1')"
            exit 1
          fi
          echo "тЬЕ Environment variables verified:"
          echo ""
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo "ЁЯУЛ ENVIRONMENT VARIABLES CHECK:"
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo ""
          echo "ЁЯФС APP_STORE_KEY_ID:"
          echo "   Value: $APP_STORE_KEY_ID"
          echo "   Length: ${#APP_STORE_KEY_ID} characters"
          echo "   Expected: 10 characters (e.g., 2N2LSDXR7U)"
          echo ""
          echo "ЁЯПв APP_STORE_ISSUER_ID:"
          echo "   Value: $APP_STORE_ISSUER_ID"
          echo "   Length: ${#APP_STORE_ISSUER_ID} characters"
          echo "   Expected: UUID format (36 characters with dashes)"
          echo ""
          echo "ЁЯФР APP_STORE_PRIVATE_KEY:"
          echo "   Length: ${#APP_STORE_PRIVATE_KEY} characters"
          echo "   Expected: ~344 characters (Base64 encoded .p8 file)"
          if [ ${#APP_STORE_PRIVATE_KEY} -gt 20 ]; then
            echo "   First 20 chars: ${APP_STORE_PRIVATE_KEY:0:20}..."
            echo "   Last 20 chars: ...${APP_STORE_PRIVATE_KEY: -20}"
            # Check if it looks like Base64
            if echo "$APP_STORE_PRIVATE_KEY" | grep -q "^[A-Za-z0-9+/=]"; then
              echo "   Format: тЬЕ Looks like Base64"
            else
              echo "   Format: тЪая╕П  Might not be Base64 (should start with A-Z, a-z, 0-9, +, /, or =)"
            fi
          else
            echo "   тЪая╕П  WARNING: Key seems too short!"
          fi
          echo ""
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo ""

          # --- 1. DECODE SECRETS ---
          echo "ЁЯФУ Decoding secrets..."
          echo "$CM_CERTIFICATE" | base64 --decode > ../certificate.p12
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > ../profile.mobileprovision
          
          echo "ЁЯУК File sizes:"
          ls -l ../certificate.p12
          ls -l ../profile.mobileprovision
          
          if [ ! -s "../certificate.p12" ]; then
             echo "тЭМ Error: certificate.p12 is empty!"
             exit 1
          fi
          
          # --- 2. INITIALIZE KEYCHAIN ---
          echo "ЁЯФР Initializing Keychain..."
          keychain initialize

          # --- 3. IMPORT CERTIFICATE ---
          echo "ЁЯФС Importing certificate..."
          # Verify integrity first
          openssl pkcs12 -info -in ../certificate.p12 -passin pass:12345 -noout || echo "тЪая╕П P12 check warning"
          
          keychain add-certificates \
            --certificate ../certificate.p12 \
            --certificate-password "12345"

          # --- 4. PREPARE SIGNING ---
          echo "ЁЯУЭ Preparing Signing Configuration..."
          
          # Extract Data from Profile
          PROFILE_PATH="../profile.mobileprovision"
          UUID=$(security cms -D -i "$PROFILE_PATH" | grep -A1 UUID | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          TEAM_ID=$(security cms -D -i "$PROFILE_PATH" | grep -A2 TeamIdentifier | tail -n1 | cut -d'>' -f2 | cut -d'<' -f1)
          
          echo "тЬЕ UUID: $UUID"
          echo "тЬЕ Team ID: $TEAM_ID"

          if [ -z "$UUID" ]; then echo "тЭМ UUID is empty"; exit 1; fi

          # Install Provisioning Profile
          PROFILES_DIR=$HOME/Library/MobileDevice/Provisioning\ Profiles
          mkdir -p "$PROFILES_DIR"
          cp "$PROFILE_PATH" "$PROFILES_DIR/$UUID.mobileprovision"
          echo "тЬЕ Installed profile to $PROFILES_DIR/$UUID.mobileprovision"

          # Generate ExportOptions.plist
          # ВАЖНО: Минимальный правильный вариант для ручного signing
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>stripSwiftSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

          # --- 5. PREPARE DEPENDENCIES ---
          echo "ЁЯУж Installing Dependencies..."
          flutter pub get
          
          # Ensure iOS config exists (no codesign to avoid errors before we patch)
          flutter build ios --config-only --no-codesign || true

          cd ios
          pod install --repo-update || true
          
          # Patch Podfile safely using Ruby
          echo "ЁЯФз Patching Podfile..."
          ruby -e "
            path = 'Podfile'
            if File.exist?(path)
              text = File.read(path)
              if text.include?('post_install') && !text.include?('CODE_SIGNING_ALLOWED')
                puts 'Found post_install, injecting settings...'
                snippet = \"flutter_additional_ios_build_settings(target); target.build_configurations.each { |cfg| cfg.build_settings['CODE_SIGNING_ALLOWED']='NO'; cfg.build_settings['CODE_SIGNING_REQUIRED']='NO'; cfg.build_settings['EXPANDED_CODE_SIGN_IDENTITY']=''; cfg.build_settings['CODE_SIGNING_IDENTITY']='' }\"
                new_text = text.gsub(/flutter_additional_ios_build_settings\(target\)/, snippet)
                File.write(path, new_text)
              elsif !text.include?('post_install')
                puts 'No post_install found, appending...'
                File.open(path, 'a') { |f| f.puts \"\npost_install do |installer|\n  installer.pods_project.targets.each do |target|\n    target.build_configurations.each do |config|\n      config.build_settings['CODE_SIGNING_ALLOWED'] = 'NO'\n      config.build_settings['CODE_SIGNING_REQUIRED'] = 'NO'\n      config.build_settings['EXPANDED_CODE_SIGN_IDENTITY'] = ''\n      config.build_settings['CODE_SIGNING_IDENTITY'] = ''\n    end\n  end\nend\" }
              end
            else
               puts 'тЭМ Podfile not found'
               exit 1
            end
          "
          
          pod install
          cd ..

          # --- 6. BUILD ARCHIVE ---
          echo "ЁЯПЧ Building Archive..."
          
          # Patch Xcode Project
          gem install xcodeproj
          ruby -e "
            require 'xcodeproj'
            project = Xcodeproj::Project.open('ios/Runner.xcodeproj')
            target = project.targets.find { |t| t.name == 'Runner' }
            target.build_configurations.each do |config|
              if config.name == 'Release'
                config.build_settings['CODE_SIGN_STYLE'] = 'Manual'
                config.build_settings['PROVISIONING_PROFILE_SPECIFIER'] = '$UUID'
                config.build_settings['DEVELOPMENT_TEAM'] = '$TEAM_ID'
                config.build_settings['CODE_SIGN_IDENTITY'] = 'iPhone Distribution'
                config.build_settings['PRODUCT_BUNDLE_IDENTIFIER'] = 'ru.prirodaspa.app'
              end
            end
            project.save
          "

          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner \
            -configuration Release \
            -archivePath build/ios/Runner.xcarchive \
            archive \
            -allowProvisioningUpdates

          # --- 7. EXPORT IPA ---
          echo "ЁЯУж Exporting IPA..."
          xcodebuild -exportArchive \
            -archivePath build/ios/Runner.xcarchive \
            -exportPath build/ios/ipa \
            -exportOptionsPlist ios/ExportOptions.plist

          # --- 8. PUBLISH TO APP STORE ---
          echo "ЁЯЪА Publishing to App Store Connect..."
          
          # Prepare API Key File in the standard location for altool
          # altool looks in ~/private_keys/
          mkdir -p ~/private_keys
          KEY_FILE="$HOME/private_keys/AuthKey_$APP_STORE_KEY_ID.p8"
          
          echo "ЁЯФС Preparing API Key at $KEY_FILE"
          
          # Use Python to decode/write the key safely
          python3 -c "
          import os
          import base64
          
          key = os.environ.get('APP_STORE_PRIVATE_KEY', '').strip()
          path = '$KEY_FILE'
          
          try:
              content = ''
              if 'BEGIN PRIVATE KEY' not in key:
                  content = base64.b64decode(key).decode('utf-8')
                  print('тЬЕ Detected Base64 key, decoded successfully.')
              else:
                  print('тД╣я╕П Detected raw PEM key, using as is.')
                  content = key
                  
              with open(path, 'w') as f:
                  f.write(content)
                  if not content.endswith('\n'):
                      f.write('\n')
              
              # Set proper permissions (read-only for owner)
              os.chmod(path, 0o600)
              print(f'тЬЕ Key file created at {path}')
              print(f'тЬЕ Key file size: {os.path.getsize(path)} bytes')
              print(f'тЬЕ Key file permissions: {oct(os.stat(path).st_mode)[-3:]}')
                      
          except Exception as e:
              print(f'тЭМ Error processing key: {e}')
              exit(1)
          "
          
          # Verify key file exists and is readable
          if [ ! -f "$KEY_FILE" ]; then
            echo "тЭМ Key file not found at $KEY_FILE"
            exit 1
          fi
          
          # Verify key content starts correctly
          KEY_FIRST_LINE=$(head -n 1 "$KEY_FILE")
          KEY_LAST_LINE=$(tail -n 1 "$KEY_FILE")
          KEY_LINE_COUNT=$(wc -l < "$KEY_FILE" | tr -d ' ')
          
          echo ""
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo "ЁЯУЛ DECODED API KEY VERIFICATION:"
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo ""
          echo "ЁЯУБ Key file path: $KEY_FILE"
          echo "ЁЯУП Key file size: $(stat -f%z "$KEY_FILE" 2>/dev/null || stat -c%s "$KEY_FILE" 2>/dev/null || echo "unknown") bytes"
          echo "ЁЯУД Key file lines: $KEY_LINE_COUNT"
          echo ""
          
          if ! echo "$KEY_FIRST_LINE" | grep -q "BEGIN"; then
            echo "тЭМ Key file format incorrect (should start with BEGIN)"
            echo "   First line: $KEY_FIRST_LINE"
            exit 1
          fi
          
          echo "тЬЕ Key file format verified:"
          echo "   First line: $KEY_FIRST_LINE"
          echo "   Last line:  $KEY_LAST_LINE"
          echo ""
          
          # Show key ID from filename for verification
          EXPECTED_KEY_ID=$(basename "$KEY_FILE" | sed 's/AuthKey_\(.*\)\.p8/\1/')
          echo "ЁЯФН Key ID verification:"
          echo "   Expected Key ID (from filename): $EXPECTED_KEY_ID"
          echo "   Environment Key ID: $APP_STORE_KEY_ID"
          if [ "$EXPECTED_KEY_ID" = "$APP_STORE_KEY_ID" ]; then
            echo "   Status: тЬЕ Match"
          else
            echo "   Status: тЪая╕П  Mismatch! Filename doesn't match environment variable"
          fi
          echo ""
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo ""
          
          # Verify key file is not empty and has reasonable size
          KEY_SIZE=$(stat -f%z "$KEY_FILE" 2>/dev/null || stat -c%s "$KEY_FILE" 2>/dev/null || echo "0")
          if [ "$KEY_SIZE" -lt 100 ]; then
            echo "тЭМ Key file seems too small ($KEY_SIZE bytes)"
            exit 1
          fi
          echo "тЬЕ Key file size: $KEY_SIZE bytes"
          
          # Verify key file permissions
          KEY_PERMS=$(stat -f%A "$KEY_FILE" 2>/dev/null || stat -c%a "$KEY_FILE" 2>/dev/null || echo "unknown")
          echo "тЬЕ Key file permissions: $KEY_PERMS (should be 600)"
          if [ "$KEY_PERMS" != "600" ] && [ "$KEY_PERMS" != "0600" ]; then
            echo "тЪая╕П  WARNING: Key file permissions are not 600, fixing..."
            chmod 600 "$KEY_FILE"
            echo "тЬЕ Fixed permissions to 600"
          fi
          
          # Verify key is readable
          if [ ! -r "$KEY_FILE" ]; then
            echo "тЭМ Key file is not readable!"
            exit 1
          fi
          echo "тЬЕ Key file is readable"
          
          # Try to validate PEM format with openssl if available
          if command -v openssl >/dev/null 2>&1; then
            echo "ЁЯФН Validating key format with openssl..."
            if openssl pkey -in "$KEY_FILE" -noout >/dev/null 2>&1; then
              echo "тЬЕ Key format is valid (openssl validation passed)"
            else
              echo "тЪая╕П  WARNING: openssl could not validate key format (but continuing anyway)"
            fi
          fi
          
          IPA_PATH=$(find build/ios/ipa -name "*.ipa" | head -n 1)
          
          if [ -z "$IPA_PATH" ]; then
            echo "тЭМ No IPA file found!"
            exit 1
          fi
          
          # Verify environment variables
          echo "ЁЯФН Verifying environment variables..."
          if [ -z "$APP_STORE_KEY_ID" ]; then
            echo "тЭМ APP_STORE_KEY_ID is not set!"
            exit 1
          fi
          if [ -z "$APP_STORE_ISSUER_ID" ]; then
            echo "тЭМ APP_STORE_ISSUER_ID is not set!"
            exit 1
          fi
          echo "тЬЕ APP_STORE_KEY_ID: $APP_STORE_KEY_ID"
          echo "тЬЕ APP_STORE_ISSUER_ID: $APP_STORE_ISSUER_ID"
          
          echo "ЁЯУж Uploading $IPA_PATH to App Store Connect..."
          
          # IMPORTANT: The app MUST exist in App Store Connect first!
          # If you see "Failed to determine the Apple ID from Bundle ID", 
          # it means the app doesn't exist yet.
          # 
          # Solution: Go to App Store Connect and create the app manually,
          # OR use the workaround below to skip validation
          
          # Try upload - altool has known issues with API keys, so we'll try multiple approaches
          echo "ЁЯЪА Attempting to upload IPA..."
          
          # Pre-check: Verify API key is accessible
          echo "ЁЯФН Pre-check: Verifying API key setup..."
          if [ -z "$APP_STORE_KEY_ID" ] || [ -z "$APP_STORE_ISSUER_ID" ]; then
            echo "тЭМ ERROR: APP_STORE_KEY_ID or APP_STORE_ISSUER_ID is not set!"
            exit 1
          fi
          
          if [ ! -f "$HOME/private_keys/AuthKey_$APP_STORE_KEY_ID.p8" ]; then
            echo "тЭМ ERROR: API key file not found: $HOME/private_keys/AuthKey_$APP_STORE_KEY_ID.p8"
            exit 1
          fi
          
          echo "тЬЕ API key file found"
          
          # Verify key file format
          KEY_FILE="$HOME/private_keys/AuthKey_$APP_STORE_KEY_ID.p8"
          if ! head -1 "$KEY_FILE" | grep -q "BEGIN PRIVATE KEY"; then
            echo "тЪая╕П  WARNING: API key file might not be in correct PEM format"
            echo "   First line should be: -----BEGIN PRIVATE KEY-----"
            echo "   Actual first line: $(head -1 "$KEY_FILE")"
          else
            echo "тЬЕ API key file format looks correct"
          fi
          
          echo "ЁЯУж Bundle ID: ru.prirodaspa.app"
          echo "ЁЯФС Key ID: $APP_STORE_KEY_ID"
          echo "ЁЯПв Issuer ID: $APP_STORE_ISSUER_ID"
          echo ""
          echo "тЪая╕П  IMPORTANT: Make sure the app is created in App Store Connect!"
          echo "   If you see 'Failed to determine Apple ID' error, create the app first:"
          echo "   https://appstoreconnect.apple.com -> My Apps -> + -> New App"
          echo ""
          
          # Method 1: Try altool with API key
          echo "ЁЯУд Method 1: Using altool with API key..."
          UPLOAD_LOG=$(mktemp)
          
          # Debug: Show what we're about to run
          echo ""
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo "ЁЯФН ALTOOL UPLOAD PARAMETERS:"
          echo "тФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБтФБ"
          echo ""
          echo "ЁЯУж IPA File:"
          echo "   Path: $IPA_PATH"
          echo "   Size: $(stat -f%z "$IPA_PATH" 2>/dev/null || stat -c%s "$IPA_PATH" 2>/dev/null || echo "unknown") bytes"
          echo "   Exists: тЬЕ"
          echo ""
          echo "ЁЯФС API Key Configuration:"
